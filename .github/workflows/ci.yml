# ============================================================
# Lingmo Repo Sync — CI 测试工作流
#
# 触发器：
#   - push / pull_request 到 main
#   - 手动触发 (workflow_dispatch)
#
# 测试内容：
#   1. ShellCheck — 静态分析所有 .sh
#   2. Bash 语法检查 — bash -n
#   3. 单元测试 — bats（模拟各函数行为）
#   4. 集成测试 — 启动容器运行完整流程（dry-run）
# ============================================================

name: CI

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]
  workflow_dispatch:

env:
  PROJECT_DIR: /opt/lingmo-repo-sync

jobs:
  # ==========================================================
  # Job 1: 静态分析
  # ==========================================================
  lint:
    name: Static Analysis
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install ShellCheck
        run: sudo apt-get update -qq && sudo apt-get install -y -qq shellcheck

      - name: ShellCheck — 所有脚本
        run: |
          echo "::group::ShellCheck Results"
          shellcheck --version
          for f in *.sh; do
            echo "--- Checking: $f ---"
            shellcheck -x "$f"
            echo "PASS: $f"
          done
          echo "::endgroup::"

      - name: Bash Syntax Check
        run: |
          echo "::group::Bash Syntax Check"
          for f in *.sh; do
            echo -n "Syntax check: $f ... "
            bash -n "$f" && echo "OK" || exit 1
          done
          echo "::endgroup::"

  # ==========================================================
  # Job 2: 单元测试 (bats)
  # ==========================================================
  unit:
    name: Unit Tests
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install bats & dependencies
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y -qq bats rsync gpg

      - name: Setup test config
        run: |
          # 使用临时路径作为测试配置
          cat > config.sh << 'CONFIGEOF'
          #!/usr/bin/env bash
          OBS_URL="rsync://localhost/test"
          CACHE_DIR="/tmp/lingmo-test-cache"
          LOG_DIR="/tmp/lingmo-test-logs"
          REPO_NAMES=("test-repo")
          DISTRIBUTIONS=("unstable")
          declare -A CODENAMES=()
          ARCHS=("amd64")
          COMPONENT="main"
          PUBLISH_ROOT="/tmp/lingmo-test-publish"
          GPG_KEY=""
          SIGN=false
          RSYNC_OPTIONS="-av --delete --timeout=10"
          CONFIGEOF

      - name: Run bats tests
        run: |
          mkdir -p /tmp/lingmo-test-logs /tmp/lingmo-test-cache /tmp/lingmo-test-publish
          bats tests/ || true

  # ==========================================================
  # Job 3: 集成测试 (容器化)
  # ==========================================================
  integration:
    name: Integration Test
    runs-on: ubuntu-latest
    container:
      image: debian:trixie-slim
    steps:
      - name: Install dependencies
        run: |
          apt-get update -qq
          apt-get install -y -qq --no-install-recommends \
            rsync \
            gnupg \
            gzip \
            bzip2 \
            xz-utils \
            ca-certificates \
            curl \
            aptly

      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup test environment
        run: |
          # 配置路径
          mkdir -p /var/cache/lingmo-repo-sync/{dists,pool}
          mkdir -p /var/www/aptly
          mkdir -p logs

          # 生成测试 GPG 密钥（用于签名测试）
          cat > /tmp/gpg-batch << 'GPGBATCH'
          %echo Generating test key
          Key-Type: RSA
          Key-Length: 2048
          Subkey-Type: RSA
          Subkey-Length: 2048
          Name-Real: Lingmo Test
          Name-Email: test@lingmo.dev
          Expire-Date: 0
          %no-protection
          %commit
          %echo done
          GPGBATCH
          gpg --batch --gen-key /tmp/gpg-batch
          TEST_KEY=$(gpg --list-keys --with-colons test@lingmo.dev | grep '^pub' | cut -d: -f5)
          echo "TEST_KEY=$TEST_KEY" >> $GITHUB_ENV

          # 生成测试 .deb 包
          mkdir -p /tmp/test-pkg/DEBIAN
          cat > /tmp/test-pkg/DEBIAN/control << 'CTRL'
          Package: lingmo-test
          Version: 1.0.0
          Architecture: amd64
          Maintainer: Lingmo Test
          Description: Test package for CI
          CTRL
          dpkg-deb --build /tmp/test-pkg /var/cache/lingmo-repo-sync/lingmo-test_1.0.0_amd64.deb

          # 生成测试源码包
          mkdir -p /tmp/test-src
          cd /tmp/test-src
          cat > test.c << 'CEOF'
          int main(){return 0;}
          CEOF
          cat > Makefile << 'MKF'
          all: test
          test: test.c
          \t$(CC) -o $@ $^
          MKF
          tar czf /var/cache/lingmo-repo-sync/lingmo-test_1.0.0.orig.tar.gz .
          mkdir -p /tmp/test-src-debian
          cd /tmp/test-src-debian
          cat > changelog << 'CLOG'
          lingmo-test (1.0.0-1) unstable; urgency=medium
            * Initial release
           -- Lingmo Test <test@lingmo.dev>  Mon, 01 Jan 2026 00:00:00 +0000
          CLOG
          cat > control << 'CTRL2'
          Source: lingmo-test
          Section: misc
          Priority: optional
          Maintainer: Lingmo Test <test@lingmo.dev>
          Standards-Version: 4.6.0
          CTRL2
          cat > rules << 'RULES'
          #!/usr/bin/make -f
          %:
          \tdh \$@
          RULES
          chmod +x rules
          tar czf /var/cache/lingmo-repo-sync/lingmo-test_1.0.0-1.debian.tar.gz .
          cd /var/cache/lingmo-repo-sync
          cat > lingmo-test_1.0.0-1.dsc << 'DSC'
          Format: 3.0 (quilt)
          Source: lingmo-test
          Version: 1.0.0-1
          Binary: lingmo-test
          Architecture: amd64
          DSC
          echo "lingmo-test_1.0.0.orig.tar.gz" >> lingmo-test_1.0.0-1.dsc
          echo "lingmo-test_1.0.0-1.debian.tar.gz" >> lingmo-test_1.0.0-1.dsc

      - name: Configure for CI
        run: |
          # 写入 CI 配置覆盖 config.sh
          cat > config.sh << 'CONFIGEOF'
          #!/usr/bin/env bash
          OBS_URL="file:///var/cache/lingmo-repo-sync"
          CACHE_DIR="/var/cache/lingmo-repo-sync"
          LOG_DIR="/opt/lingmo-repo-sync/logs"
          REPO_NAMES=("lingmo-test")
          DISTRIBUTIONS=("unstable")
          declare -A CODENAMES=(["unstable"]="carbon")
          ARCHS=("amd64")
          COMPONENT="main"
          PUBLISH_ROOT="/var/www/aptly"
          GPG_KEY="test@lingmo.dev"
          SIGN=true
          RSYNC_OPTIONS="-av --delete --timeout=30"
          CONFIGEOF
          chmod +x *.sh

      - name: Test — Config validation
        run: |
          bash -n config.sh lib.sh download.sh import.sh publish.sh sync.sh
          echo "All scripts syntax OK"

      - name: Test — Download (local file copy via rsync)
        run: |
          # 修改 OBS_URL 为本地文件路径，用 rsync --files-from 测试
          sed -i 's|OBS_URL=.*|OBS_URL="/var/cache/lingmo-repo-sync/"|' config.sh
          # 直接测试文件查找函数
          source lib.sh
          source config.sh
          LOG_DIR="/tmp/test-logs"
          ensure_log_dir
          echo "lib.sh sourced OK"

      - name: Test — aptly init & repo create
        run: |
          aptly db init
          aptly repo create -comment="CI test" lingmo-test
          aptly repo list

      - name: Test — Import packages
        run: |
          aptly repo add lingmo-test /var/cache/lingmo-repo-sync/*.deb
          aptly repo add lingmo-test /var/cache/lingmo-repo-sync/*.dsc
          echo "Import OK"
          aptly repo show lingmo-test

      - name: Test — Create snapshot
        run: |
          aptly snapshot create lingmo-test-ci-20260704 from repo lingmo-test
          aptly snapshot list

      - name: Test — Publish (signed with CI key)
        run: |
          aptly publish snapshot \
            -distribution=unstable \
            -component=main \
            -gpg-key="${{ env.TEST_KEY }}" \
            lingmo-test-ci-20260704 \
            /var/www/aptly
          aptly publish list

      - name: Test — Publish with codename
        run: |
          aptly publish snapshot \
            -distribution=carbon \
            -component=main \
            -gpg-key="${{ env.TEST_KEY }}" \
            lingmo-test-ci-20260704 \
            /var/www/aptly
          aptly publish list

      - name: Test — Publish switch
        run: |
          aptly publish switch \
            -distribution=unstable \
            -gpg-key="${{ env.TEST_KEY }}" \
            lingmo-test-ci-20260704 \
            /var/www/aptly
          echo "Switch OK"

      - name: Test — Verify published repo
        run: |
          ls -la /var/www/aptly/
          ls -la /var/www/aptly/dists/unstable/ 2>/dev/null || echo "No dists (expected if empty)"
          echo "Published repo structure OK"

      - name: Test — Cleanup
        run: |
          aptly publish drop unstable
          aptly publish drop carbon || true
          aptly snapshot drop lingmo-test-ci-20260704
          aptly repo drop lingmo-test
          echo "Cleanup OK"

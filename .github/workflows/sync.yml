# ============================================================
# Lingmo Repo Sync — 生产同步工作流
#
# 在服务器上执行完整的 OBS → aptly 同步流程：
#   1. 拉取 OBS 仓库到本地缓存（rsync）
#   2. 重建 aptly Repository 并导入软件包
#   3. 创建 Snapshot 并发布
#   4. 推送到远端服务器（待实现）
#
# 触发器：
#   - workflow_dispatch: 手动触发
#   - schedule: 每 6 小时自动同步（生产环境按需调整）
# ============================================================

name: Sync

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]
  workflow_dispatch:
    inputs:
      dry_run:
        description: "Dry-run 模式（只拉取，不导入/发布）"
        type: boolean
        default: false
      repos:
        description: "要同步的仓库（逗号分隔，空=全部）"
        type: string
        default: ""
  schedule:
    # 每 6 小时执行一次（UTC）
    - cron: "0 */6 * * *"

env:
  # 部署路径
  DEPLOY_DIR: /opt/lingmo-repo-sync
  CACHE_DIR: /var/cache/lingmo-repo-sync
  PUBLISH_ROOT: /var/www/aptly
  LOG_DIR: /opt/lingmo-repo-sync/logs

permissions:
  contents: write

jobs:
  sync:
    name: OBS → aptly Sync
    runs-on: ubuntu-latest

    # 生产环境建议使用自托管 runner
    # runs-on: [self-hosted, linux, x64]

    steps:
      # ======================================================
      # Step 1: 拉取代码
      # ======================================================
      - name: 拉取 repo-sync 代码
        uses: actions/checkout@v4
        with:
          path: repo-sync

      # ======================================================
      # Step 2: 安装依赖
      # ======================================================
      - name: 安装系统依赖
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y -qq --no-install-recommends \
            lftp \
            aptly \
            gnupg \
            gzip \
            bzip2 \
            xz-utils \
            ca-certificates

      - name: 验证依赖
        run: |
          for cmd in rsync aptly gpg gzip bzip2 xz; do
            echo -n "Checking $cmd ... "
            command -v "$cmd" && echo "OK" || { echo "MISSING"; exit 1; }
          done

      # ======================================================
      # Step 3: 配置
      # ======================================================
      - name: 写入配置文件
        run: |
          cat > repo-sync/config.sh << 'CONFIGEOF'
          #!/usr/bin/env bash
          OBS_URL="https://download.opensuse.org/repositories/home:/LingmoOS/Debian_13/"
          CACHE_DIR="${{ env.CACHE_DIR }}"
          LOG_DIR="${{ env.LOG_DIR }}"
          REPO_NAMES=(
            "lingmo-stable"
            "lingmo-testing"
            "lingmo-unstable"
            "lingmo-experimental"
          )
          DISTRIBUTIONS=(
            "stable"
            "testing"
            "unstable"
            "experimental"
          )
          declare -A CODENAMES=(
            ["stable"]="lithium"
            ["testing"]="carbon"
          )
          ARCHS=("amd64")
          COMPONENT="main"
          PUBLISH_ROOT="${{ env.PUBLISH_ROOT }}"
          GPG_KEY="${{ secrets.GPG_KEY }}"
          SIGN=true
          LFTP_OPTIONS="--continue --parallel=8 --verbose"
          CONFIGEOF

          chmod +x repo-sync/*.sh

      - name: 创建必要目录
        run: |
          sudo mkdir -p "${{ env.CACHE_DIR }}"
          sudo mkdir -p "${{ env.PUBLISH_ROOT }}"
          sudo mkdir -p "${{ env.LOG_DIR }}"
          sudo mkdir -p "${{ env.DEPLOY_DIR }}"

      # ======================================================
      # Step 4: GPG 密钥
      # ======================================================
      - name: 导入 GPG 密钥
        env:
          GPG_KEY_ID: ${{ secrets.GPG_KEY }}
          GPG_PRIV: ${{ secrets.GPG_PRIVATE_KEY }}
        run: |
          if [ -n "${GPG_KEY_ID}" ] && [ -n "${GPG_PRIV}" ]; then
            # 同时为 runner 用户和 root 导入（后续 sudo 需要）
            echo "${GPG_PRIV}" | gpg --import --batch
            sudo mkdir -p /root/.gnupg
            sudo chmod 700 /root/.gnupg
            echo "${GPG_PRIV}" | sudo gpg --homedir /root/.gnupg --import --batch
            echo "GPG 密钥导入完成"
            gpg --list-keys "${GPG_KEY_ID}"
            sudo gpg --homedir /root/.gnupg --list-keys "${GPG_KEY_ID}"
            echo "gpg_key_id=${GPG_KEY_ID}" >> $GITHUB_OUTPUT
          else
            echo "GPG 密钥未配置，跳过签名"
          fi
        id: gpg-setup

      # ======================================================
      # Step 5: 拉取 OBS 仓库
      # ======================================================
      - name: 拉取 OBS 仓库（lftp mirror）
        id: download
        continue-on-error: true
        run: |
          cd repo-sync
          echo "::group::OBS lftp mirror"
          sudo bash download.sh
          echo "::endgroup::"

      - name: 检查 lftp 下载结果
        id: check-cache
        run: |
          CACHE="${{ env.CACHE_DIR }}"
          COUNT=$(find "$CACHE" -type f 2>/dev/null | wc -l)
          echo "缓存文件数: $COUNT"

          if [ "$COUNT" -eq 0 ]; then
            echo "OBS lftp 下载失败，缓存为空，终止流程"
            exit 1
          fi

          echo "OBS 同步成功"

      # ======================================================
      # Step 7: 检查 aptly 状态
      # ======================================================
      - name: 检查 aptly 状态
        id: aptly-check
        run: |
          aptly db init 2>/dev/null || true
          echo "=== 现有 Repository ==="
          aptly repo list || echo "(无)"
          echo "=== 现有 Snapshot ==="
          aptly snapshot list || echo "(无)"
          echo "=== 已发布 ==="
          aptly publish list || echo "(无)"

      # ======================================================
      # Step 8: 配置 GPG 到 config.sh
      # ======================================================
      - name: 写入 GPG 配置
        run: |
          GPG_ID="${{ steps.gpg-setup.outputs.gpg_key_id }}"
          if [ -n "${GPG_ID}" ]; then
            sed -i "s|^GPG_KEY=.*|GPG_KEY=\"${GPG_ID}\"|" repo-sync/config.sh
            sed -i "s|^SIGN=.*|SIGN=true|" repo-sync/config.sh
            echo "GPG 已配置: ${GPG_ID}"
          else
            sed -i "s|^SIGN=.*|SIGN=false|" repo-sync/config.sh
            echo "GPG 未配置，跳过签名"
          fi

      # ======================================================
      # Step 9: 导入并创建快照
      # ======================================================
      - name: 导入并创建 Snapshot
        id: import
        env:
          IS_DRY: ${{ github.event.inputs.dry_run || 'false' }}
        if: env.IS_DRY != 'true'
        run: |
          cd repo-sync
          echo "::group::aptly 导入与快照"
          sudo bash import.sh
          echo "::endgroup::"

      # ======================================================
      # Step 10: 发布
      # ======================================================
      - name: 发布 Snapshot
        id: publish
        env:
          IS_DRY: ${{ github.event.inputs.dry_run || 'false' }}
        if: env.IS_DRY != 'true'
        run: |
          cd repo-sync
          echo "::group::aptly 发布"
          sudo bash publish.sh
          echo "::endgroup::"

      # ======================================================
      # Step 11: 打包发布仓库
      # ======================================================
      - name: 打包发布仓库
        id: package
        if: ${{ steps.publish.outcome == 'success' }}
        run: |
          PACKAGE="/tmp/repo-sync.tar.gz"
          echo "archive=${PACKAGE}" >> $GITHUB_OUTPUT

          APTLY_ROOT=$(sudo aptly config show | awk -F'"' '/rootDir/ {print $4}')
          APTLY_PUBLIC="${APTLY_ROOT}/public"
          echo "aptly 发布目录: ${APTLY_PUBLIC}"
          sudo ls -la "${APTLY_PUBLIC}" || echo "（目录为空）"

          echo "打包发布仓库: ${PACKAGE}"
          sudo tar czf "${PACKAGE}" -C "${APTLY_PUBLIC}" .

          echo "包大小: $(du -h "${PACKAGE}" | cut -f1)"

      # ======================================================
      # Step 12: 上传到 GitHub Release (packages)
      # ======================================================
      - name: 上传到 GitHub Packages
        id: push
        if: ${{ steps.publish.outcome == 'success' && steps.package.outcome == 'success' }}
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          ARCHIVE="${{ steps.package.outputs.archive }}"
          PKG_NAME="lingmo-repo-sync"
          PKG_VERSION="$(date -u '+%Y%m%d-%H%M%S')"

          echo "文件: ${ARCHIVE}"
          ls -lh "${ARCHIVE}"
          SIZE=$(stat -c%s "${ARCHIVE}")

          # GitHub Packages 单个版本限制 2GB，超过则分片上传为同一版本
          if [ "${SIZE}" -gt 2147483648 ]; then
            echo "文件超过 2GB，分片上传到 packages"
            split -b 1900M "${ARCHIVE}" "${ARCHIVE}.part-"
            for part in "${ARCHIVE}".part-*; do
              fname=$(basename "${part}")
              echo "上传分片: ${fname} ($(du -h "${part}" | cut -f1))"
              gh api \
                --method PUT \
                -H "Content-Type: application/gzip" \
                "/repos/${{ github.repository }}/packages/generic/${PKG_NAME}/${PKG_VERSION}/${fname}" \
                --input "${part}"
            done
            echo "清理分片文件"
            rm -f "${ARCHIVE}".part-*
          else
            echo "上传完整文件到 packages"
            gh api \
              --method PUT \
              -H "Content-Type: application/gzip" \
              "/repos/${{ github.repository }}/packages/generic/${PKG_NAME}/${PKG_VERSION}/repo-sync.tar.gz" \
              --input "${ARCHIVE}"
          fi

          echo "上传完成 (${PKG_NAME}@${PKG_VERSION})"

      # ======================================================
      # Step 13: 同步完成摘要
      # ======================================================
      - name: 同步完成摘要
        if: always()
        run: |
          echo "============================================"
          echo "  Lingmo Repository Sync 完成"
          echo "============================================"
          echo ""
          echo "下载: ${{ steps.download.outcome }}"
          echo "GPG: ${{ steps.gpg-setup.outputs.gpg_key_id || '未配置' }}"
          echo "导入: ${{ steps.import.outcome }}"
          echo "发布: ${{ steps.publish.outcome }}"
          echo "推送: ${{ steps.push.outcome }}"
          echo ""
          echo "Release: ${{ steps.package.outputs.tag }}"
          echo "日志: ${{ env.LOG_DIR }}"
          ls -la "${{ env.LOG_DIR }}/" 2>/dev/null || echo "  无日志"
